name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip
          python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s tests -q

      - name: Validate golden transcripts
        run: python scripts/validate_transcripts.py

      - name: Run no-network demo end-to-end
        run: python scripts/research_state.py demo "$RUNNER_TEMP/deep-demo" --json

      - name: Verify installed CLI
        run: deep-research-state demo "$RUNNER_TEMP/deep-demo-installed" --json

      - name: Build and verify distributions
        if: matrix.python-version == '3.12'
        run: |
          python -m build
          python -m twine check dist/*

      - name: Audit installed dependencies
        if: matrix.python-version == '3.12'
        run: python -m pip_audit --skip-editable
